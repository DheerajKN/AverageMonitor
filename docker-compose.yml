services:
  average-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: average-monitor:local
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:h2:file:/app/data/average-monitor;AUTO_SERVER=FALSE
      DATABASE_USERNAME: sa
      DATABASE_PASSWORD:
    volumes:
      - average-monitor-data:/app/data
    restart: unless-stopped

volumes:
  average-monitor-data:
